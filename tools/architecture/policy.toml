production_rust_max = 1000
module_root_max = 300
powershell_max = 800
test_max = 1200
forbidden_artifacts = [
    "*.exe",
    "*.dll",
    "*.dylib",
    "*.so",
    "*.png",
    "*.jpg",
    "*.jpeg",
    "*.bmp",
    "*.mcpack",
    "*.mcworld",
]

# Existing oversized files may only shrink. New files and files below their
# category limit remain governed by the strict limits above.
[[line_baselines]]
path = "app/tests/assets.rs"
max = 1381

[[line_baselines]]
path = "app/src/tests/finish.rs"
max = 1232

[[vendored]]
path = "crates/protocol/vendor/"
ownership_record = "crates/protocol/vendor/UPSTREAM.md"

[[crates]]
name = "bridge"
path = "crates/bridge"
allowed_dependencies = []
forbidden_dependencies = ["asset-compiler", "bevy", "wgpu"]

[[crates]]
name = "protocol"
path = "crates/protocol"
allowed_dependencies = ["bridge"]
forbidden_dependencies = ["asset-compiler", "assets", "bevy", "wgpu"]

[[crates]]
name = "world"
path = "crates/world"
allowed_dependencies = []
forbidden_dependencies = ["asset-compiler", "bevy", "wgpu"]

[[crates]]
name = "assets"
path = "crates/assets"
allowed_dependencies = []
forbidden_dependencies = ["asset-compiler", "bevy", "clap", "image", "wgpu"]

[[crates]]
name = "asset-compiler"
path = "crates/asset-compiler"
allowed_dependencies = ["assets"]
forbidden_dependencies = ["bevy", "wgpu"]

[[crates]]
name = "meshing"
path = "crates/meshing"
allowed_dependencies = ["assets", "world"]
forbidden_dependencies = ["asset-compiler", "bevy", "wgpu"]

[[crates]]
name = "client-world"
path = "crates/client-world"
allowed_dependencies = ["assets", "meshing", "protocol", "world"]
forbidden_dependencies = ["asset-compiler", "bevy", "wgpu"]

[[crates]]
name = "semantic-input"
path = "crates/input"
allowed_dependencies = []
forbidden_dependencies = ["asset-compiler", "bevy", "wgpu"]

[[crates]]
name = "render"
path = "crates/render"
allowed_dependencies = ["assets", "meshing", "world"]
forbidden_dependencies = ["asset-compiler"]

[[crates]]
name = "app"
path = "app"
allowed_dependencies = ["assets", "client-world", "meshing", "protocol", "render", "sim", "world"]
forbidden_dependencies = ["asset-compiler"]

[[crates]]
name = "sim"
path = "crates/sim"
allowed_dependencies = ["world"]
forbidden_dependencies = ["asset-compiler", "bevy", "wgpu"]

[[crates]]
name = "ui"
path = "crates/ui"
allowed_dependencies = ["semantic-input"]
forbidden_dependencies = ["asset-compiler", "bevy", "wgpu"]

[[crates]]
name = "visualcoverage"
path = "tools/visualcoverage"
allowed_dependencies = ["assets"]
forbidden_dependencies = ["bevy", "wgpu"]

[[crates]]
name = "architecture"
path = "tools/architecture"
allowed_dependencies = []
forbidden_dependencies = ["bevy", "wgpu"]

[[crates]]
name = "devtool"
path = "tools/devtool"
allowed_dependencies = []
forbidden_dependencies = ["bevy", "wgpu"]

