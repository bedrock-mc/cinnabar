[package]
name = "jolyne"
version = "0.1.0"
edition = "2024"
license = "MIT"

[lib]
doctest = false

[features]
default = []
client = ["dep:jsonwebtoken", "dep:reqwest"]
server = ["dep:reqwest", "dep:jsonwebtoken"]
full = ["client", "server"]
raknet = []
nethernet = []
discovery = ["nethernet"]
xbox-signaling = ["nethernet"]

[dependencies]
tokio = { version = "1.48", default-features = false, features = ["sync", "time"] }
bytes = "1.11"
thiserror = "1.0"
valentine = { version = "0.1.0", path = "../valentine", default-features = false, features = ["bedrock_1_26_30"] }
flate2 = "1.0"
snap = "1.1"
futures = "0.3"
jsonwebtoken = { version = "9.3", optional = true }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"], optional = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
base64 = "0.22"
uuid = { version = "1", features = ["v4"] }
sha2 = "0.10"
aes = "0.8"
ctr = "0.9"
aes-gcm = { version = "0.10", features = ["aes"] }
p384 = { version = "0.13", features = ["ecdh", "pkcs8"] }
rand = "0.8"
once_cell = "1.19"
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1.48", default-features = false, features = ["macros", "rt"] }
