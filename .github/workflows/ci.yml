name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
      - run: cargo fmt --check
      - run: cargo test --workspace
      - run: go test ./core/...
      - run: go vet ./core/...
